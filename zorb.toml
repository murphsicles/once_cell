[package]
name = "@core/once_cell"
version = "1.0.1"
edition = "2026"
authors = ["Zak Murphy <zak@z-lang.org>"]
description = "Single assignment cells and lazy values for Zeta."
license = "MIT"
repository = "https://github.com/murphsicles/once_cell"
keywords = ["lazy", "static", "once", "cell"]
categories = ["memory-management", "concurrency"]

[fmt]
style = "zeta-strict"
max_width = 100
use_tabs = false

[lint]
tool = "zippy"
level = "pedantic"
